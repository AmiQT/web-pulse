<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Service Sentinel</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --surface-color: rgba(31, 40, 51, 0.45);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #66fcf1;
            --text-main: #c5c6c7;
            --text-heading: #ffffff;
            --up-color: #45f248;
            --down-color: #ff3b3b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1f2833 0%, var(--bg-color) 40%);
            color: var(--text-main);
            min-height: 100vh;
            background-attachment: fixed;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            color: var(--text-heading);
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1px;
            background: -webkit-linear-gradient(45deg, #66fcf1, #45a29e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            animation: fadeInDown 0.8s ease-out;
        }

        p.subtitle {
            font-size: 1.1rem;
            font-weight: 300;
            opacity: 0.8;
            animation: fadeIn 1s ease-out 0.3s forwards;
            opacity: 0;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            animation: slideUp 0.8s ease-out 0.5s forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .card {
            background: var(--surface-color);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 30px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            border-radius: 24px 24px 0 0;
        }

        .card.up::before { background: var(--up-color); box-shadow: 0 0 15px var(--up-color); }
        .card.down::before { background: var(--down-color); box-shadow: 0 0 15px var(--down-color); }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .target-url {
            font-size: 1.2rem;
            color: var(--text-heading);
            font-weight: 600;
            margin-bottom: 20px;
            word-wrap: break-word;
        }

        .metrics {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 20px;
        }

        .metric-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
        }

        .value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-heading);
        }

        .status-badge {
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 1px;
            display: inline-block;
        }

        .status-badge.up {
            background: rgba(69, 242, 72, 0.15);
            color: var(--up-color);
            border: 1px solid rgba(69, 242, 72, 0.3);
        }

        .status-badge.down {
            background: rgba(255, 59, 59, 0.15);
            color: var(--down-color);
            border: 1px solid rgba(255, 59, 59, 0.3);
            animation: pulse-border 2s infinite;
        }

        .loader {
            text-align: center;
            padding: 100px;
            font-size: 1.5rem;
            color: var(--primary);
            animation: pulse 1.5s infinite;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(255, 59, 59, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 59, 59, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 59, 59, 0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; text-shadow: 0 0 10px var(--primary); }
            50% { opacity: 0.4; text-shadow: none; }
        }

        .last-update {
            text-align: center;
            margin-top: 40px;
            font-size: 0.9rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Global Service Sentinel</h1>
            <p class="subtitle">Real-time service availability and performance monitoring</p>
        </header>

        <div id="loading" class="loader">
            Fetching satellite telemetry...
        </div>

        <div id="grid" class="dashboard-grid">
            <!-- Cards injected by JS -->
        </div>

        <div class="last-update" id="last-update"></div>
    </div>

    <script>
        async function fetchState() {
            try {
                const response = await fetch('/api/state');
                const data = await response.json();
                renderCards(data.dashboard_results);
            } catch (error) {
                console.error("Error drawing radar:", error);
            }
        }

        function renderCards(results) {
            const grid = document.getElementById('grid');
            const loading = document.getElementById('loading');
            const sortedTargets = Object.keys(results).sort();

            if (sortedTargets.length > 0 && loading) {
                loading.style.display = 'none';
            }

            let newHtml = '';

            sortedTargets.forEach(target => {
                const details = results[target];
                const isUp = details.availability === 'UP';
                const cardClass = isUp ? 'up' : 'down';
                const latency = `${details.latency_ms} ms`;
                const statusCode = details.status_code || 'Err';

                newHtml += `
                    <div class="card ${cardClass}">
                        <div class="target-url">${document.createTextNode(target.replace('https://', '').replace('http://', '')).textContent}</div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span class="status-badge ${cardClass}">${details.availability}</span>
                        </div>
                        <div class="metrics">
                            <div class="metric-group">
                                <span class="label">Latency</span>
                                <span class="value">${latency}</span>
                            </div>
                            <div class="metric-group" style="text-align: right;">
                                <span class="label">Status Code</span>
                                <span class="value">${statusCode}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = newHtml;
            document.getElementById('last-update').innerText = `Last updated: ${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
        }

        // Initialize and poll every 3 seconds
        fetchState();
        setInterval(fetchState, 3000);
    </script>
</body>
</html>
